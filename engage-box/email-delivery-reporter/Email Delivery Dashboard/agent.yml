name: Email Delivery Dashboard
model: claude-4.5-sonnet
temperature: 0
max_tool_iterations: 4
prompt_file: prompt.md

outputs:
  - name: renderReactApp
    function_name: renderReactApp
    function_description: "Generates React components with Tailwind CSS. ENVIRONMENT CONSTRAINTS: 1. Charts: react-plotly.js is the ONLY installed library. recharts is NOT installed. 2. Icons: lucide-react is NOT installed; use inline <svg> tags only. 3. UI: Static view only. NO <button> or <a> tags. Single file, export default."
    json_schema: '{"type": "object", "properties": {}}'
  - name: text_in_form
    function_name: text_in_form
    function_description: "Output text with MD format. Use this when you want to output an error message."
    json_schema: '{"type": "object", "properties": {}}'
  - name: ":plotly:"
    function_name: new_plot
    function_description: 'Provide visualization for analysis result by rendering charts using Plotly.js. Use color scheme: ["#B4E3E3","#ABB3DB","#D9BFDF","#F8E1B0","#8FD6D4","#828DCA","#C69ED0","#F5D389","#6AC8C6","#5867B8","#B37EC0","#F1C461","#44BAB8","#2E41A6","#8CC97E","#A05EB0"]. For >3 categories: use updatemenus. For multi-chart: grid layout. Margins: {l:80, r:80, t:100, b:80}. Min dimensions: height:600, width:1000.'
    json_schema: '{"type": "object", "properties": {"data": {"type": "array", "description": "Plotly.js data JSON objects", "items": {"type": "object"}}, "layout": {"type": "object", "description": "Plotly.js layout JSON object"}}, "required": ["data"]}'

tools:
  - type: knowledge_base
    target: '@ref(type: "knowledge_base", name: "delivery_email_DOMAIN")'
    target_function: LIST_COLUMNS
    function_name: List_columns
    function_description: "Discover table schemas. Returns column names, types, and comments for tables in the database."
    output_mode: RETURN
  - type: knowledge_base
    target: '@ref(type: "knowledge_base", name: "delivery_email_DOMAIN")'
    target_function: QUERY_DATA_DIRECT
    function_name: Query_data_directly
    function_description: "Execute SQL query against Plazma DB. Max 100 rows returned. Use GROUP BY aggregations. Never SELECT *. If result contains [TRUNCATED], use OFFSET and LIMIT for pagination."
    output_mode: RETURN
  - type: knowledge_base
    target: '@ref(type: "knowledge_base", name: "OverallSummary_Spec")'
    target_function: READ_TEXT
    function_name: read_overall_summary_spec
    function_description: "Read the Overall Summary report specification from knowledge base."
    output_mode: RETURN
  - type: knowledge_base
    target: '@ref(type: "knowledge_base", name: "CampaignSummary_Spec")'
    target_function: READ_TEXT
    function_name: read_campaign_summary_spec
    function_description: "Read the Campaign/Journey Detail report specification from knowledge base."
    output_mode: RETURN
