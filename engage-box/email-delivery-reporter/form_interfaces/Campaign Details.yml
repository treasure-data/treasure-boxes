name: Campaign Details
agent: '@ref(type: "agent", name: "Email Delivery Dashboard")'
prompt_template: |
  Generate a detailed email delivery report with following conditions:
  - Report_id: 2. Campaign Summary
  - Campaign_id: {{Campaign_id}}
  - Journey_id: {{Journey_id}}
  - Language: {{Language}}
  - Currency: {{Currency}}
form_schema:
  type: object
  properties:
    Campaign_id:
      title: Campaign ID
      type: string
      placeholder: Enter Campaign ID
    Journey_id:
      title: Journey ID
      type: string
      placeholder: Enter Journey ID
    Language:
      title: Language
      type: string
      enum:
        - English
        - Japanese
      enumNames:
        - English
        - Japanese
    Currency:
      title: Currency
      type: string
      enum:
        - USD
        - JPY
      enumNames:
        - USD
        - JPY
  required:
    - Language
    - Currency
ui_schema:
  Campaign_id:
    ui:en:title: Campaign ID
    ui:ja:title: キャンペーンID
    ui:en:placeholder: Enter Campaign ID
    ui:ja:placeholder: キャンペーンIDを入力してください
  Journey_id:
    ui:en:title: Journey ID
    ui:ja:title: ジャーニーID
    ui:en:placeholder: Enter Journey ID
    ui:ja:placeholder: ジャーニーIDを入力してください
  Language:
    ui:widget: radio
    ui:en:title: Language
    ui:ja:title: 言語
    ui:en:enumNames:
      - English
      - Japanese
    ui:ja:enumNames:
      - 英語
      - 日本語
  Currency:
    ui:widget: radio
    ui:en:title: Currency
    ui:ja:title: 通貨
    ui:en:enumNames:
      - USD
      - JPY
    ui:ja:enumNames:
      - 米ドル
      - 円
use_text_resource: false
