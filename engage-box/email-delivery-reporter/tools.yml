# Agent Tool Configuration
# Email Delivery Reporter — AI Agent Foundry tool settings
#
# This file defines all tools to be configured for the agent.
# Replace <DOMAIN_NAME> with your actual database name (e.g. delivery_email_example_com)
#
# To deploy via CLI:
#   tdx llm project create "Email Delivery Reporter"
#   tdx agent push . -f

tools:
  # ── Data Access ──────────────────────────────────────────

  - function_name: List_columns
    function_description: >
      Discover table schemas. Returns column names, types, and comments
      for tables in the database.
    target: knowledge_base
    target_knowledge_base: <DOMAIN_NAME>
    target_function: List columns

  - function_name: Query_data_directly
    function_description: >
      Execute SQL query against Plazma DB. Max 100 rows returned.
      Use GROUP BY aggregations. Never SELECT *.
      If result contains [TRUNCATED], use OFFSET and LIMIT for pagination.
    target: knowledge_base
    target_knowledge_base: <DOMAIN_NAME>
    target_function: Query data directly (Presto SQL)

  - function_name: read_overall_summary_spec
    function_description: >
      Read the Overall Summary report specification from knowledge base.
    target: knowledge_base
    target_knowledge_base: DeliveryOverallSummary_Spec
    target_function: Read

  - function_name: read_campaign_summary_spec
    function_description: >
      Read the Campaign/Journey Detail report specification from knowledge base.
    target: knowledge_base
    target_knowledge_base: DeliveryCampaignSummary_Spec
    target_function: Read

  # ── Output ───────────────────────────────────────────────

  - output_name: renderReactApp
    function_name: renderReactApp
    function_description: >
      Generates React components with Tailwind CSS.
      ENVIRONMENT CONSTRAINTS:
      1. Charts: react-plotly.js is the ONLY installed library. recharts is NOT installed.
      2. Icons: lucide-react is NOT installed; use inline <svg> tags only.
      3. UI: Static view only. NO <button> or <a> tags.
      Single file, export default.
    output_type: Artifact
    artifact_content_type: React

  - output_name: text_in_form
    function_name: text_in_form
    function_description: >
      renderMarkdown — Call it when you'd like to return only an error message.
    output_type: Artifact
    artifact_content_type: Text

  - output_name: ":plotly:"
    function_name: new_plot
    function_description: >
      Provide visualization for analysis result by rendering charts using Plotly.js.
      Use color scheme: ["#B4E3E3","#ABB3DB","#D9BFDF","#F8E1B0","#8FD6D4","#828DCA",
      "#C69ED0","#F5D389","#6AC8C6","#5867B8","#B37EC0","#F1C461","#44BAB8","#2E41A6",
      "#8CC97E","#A05EB0"].
      For >3 categories: use updatemenus.
      For multi-chart: grid layout (grid: {rows:2, columns:2, pattern:'independent'}).
      Margins: {l:80, r:80, t:100, b:80}. Min dimensions: height:600, width:1000.
      For grid layouts: domain spacing [0,0.45] and [0.55,1].
    output_type: Custom
    json_schema:
      type: object
      properties:
        data:
          type: array
          description: Plotly.js data JSON objects
          items:
            type: object
        layout:
          type: object
          description: Plotly.js layout JSON object
      required:
        - data
